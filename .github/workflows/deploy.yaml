name: Deploy Website
on:
  push:
    branches:
      - "main"
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Cache Dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: dep-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci
      - name: Lint Code
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Cache Dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: dep-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install Dependencies
        run: npm ci
      - name: Run Test
        id: unit-test
        run: npm run test
      - name: Upload Test Report
        if: ${{ failure() && steps.unit-test.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test.json
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Cache Dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: dep-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install Dependencies
        run: npm ci
      - name: Build Website
        run: npm run build
  report:
    if: ${{failure()}}
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Output Report
        run: echo "Output Report"
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Website
        run: echo "Deploying ..."
