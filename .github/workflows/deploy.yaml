name: Deploy website
# job artifacts are output generated by a job
on:
  push:
    branches:
      - "main"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: RUN LINT
        run: npm run lint
      - name: RUN TEST
        run: npm run test
  build:
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
      css-file: ${{ steps.csspublish.outputs.css-file }}
    steps:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: BUILD WEBSITE
        run: npm run build

      - name: Publish css file name
        id: csspublish
        run: find dist/assets/*.css -type f -execdir echo "css-file={}" >> $GITHUB_OUTPUT ';'
      - name: Publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo "script-file={}" >> $GITHUB_OUTPUT ';'
      - name: UPLOAD ARTIFACT
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist
            package.json
  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: GET BUILD ARTIFACT
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: OUTPUT CONTENTS
        run: ls
      - name: Output Filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Output css file name
        run: echo "${needs.build.outputs.css-file}"
      - name: Deploy Website
        run: echo "Deploying ...."
