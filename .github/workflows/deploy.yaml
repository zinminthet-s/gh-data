name: Deploy website
# job artifacts are output generated by a job
on:
  push:
    branches:
      - "main"
jobs:
  test:
    runs-on: ubuntu-latest
    test:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: RUN LINT
        run: npm run lint
      - name: RUN TEST
        run: npm run test
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: BUILD PROJECT
        run: npm run build
      - name: UPLOAD ARTIFACT
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist
            package.json
  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - name: GET CODE
        uses: actions/checkout@v6
      - name: INSTALL DEPENDENCIES
        run: npm ci
      - name: Deploy Website
        run: echo "Deploying ...."
